<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ring - Battle Royale</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #111;
      color: #eee;
      font-family: monospace;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      overflow: hidden;
    }
    canvas {
      border: 1px solid #333;
      cursor: crosshair;
    }
    #hud {
      position: absolute;
      top: 10px;
      left: 50%;
      transform: translateX(-50%);
      text-align: center;
      font-size: 16px;
      pointer-events: none;
      z-index: 10;
    }
    #hud .status {
      font-size: 24px;
      font-weight: bold;
      margin-bottom: 4px;
    }
    #hud .info {
      font-size: 14px;
      color: #aaa;
    }
    #hp-bar-container {
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      width: 200px;
      height: 20px;
      background: #333;
      border: 1px solid #555;
      z-index: 10;
      pointer-events: none;
    }
    #hp-bar {
      height: 100%;
      background: #4f4;
      transition: width 0.1s;
    }
    #hp-text {
      position: absolute;
      bottom: 22px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 12px;
      color: #aaa;
      z-index: 10;
      pointer-events: none;
    }
    #controls-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
      background: rgba(0, 0, 0, 0.6);
    }
    #controls-dialog {
      background: #1a1a2e;
      border: 1px solid #555;
      border-radius: 8px;
      padding: 24px 32px;
      max-width: 360px;
      text-align: center;
    }
    #controls-dialog h2 {
      margin: 0 0 16px 0;
      font-size: 20px;
      color: #4fc;
    }
    #controls-dialog table {
      margin: 0 auto 16px auto;
      border-collapse: collapse;
    }
    #controls-dialog td {
      padding: 4px 12px;
      font-size: 14px;
    }
    #controls-dialog td:first-child {
      text-align: right;
      color: #4fc;
      font-weight: bold;
    }
    #controls-dialog td:last-child {
      text-align: left;
      color: #ccc;
    }
    #controls-dismiss {
      background: #4fc;
      color: #111;
      border: none;
      padding: 8px 24px;
      font-family: monospace;
      font-size: 14px;
      font-weight: bold;
      border-radius: 4px;
      cursor: pointer;
    }
    #controls-dismiss:hover {
      background: #3eb;
    }
    #controls-hint {
      position: absolute;
      bottom: 50px;
      right: 16px;
      font-size: 12px;
      color: #666;
      z-index: 10;
      cursor: pointer;
    }
    #controls-hint:hover {
      color: #aaa;
    }
    #nickname-container {
      position: absolute;
      top: 60px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    #nickname-input {
      background: #1a1a2e;
      border: 1px solid #555;
      border-radius: 4px;
      color: #eee;
      font-family: monospace;
      font-size: 13px;
      padding: 4px 8px;
      width: 140px;
      outline: none;
    }
    #nickname-input:focus {
      border-color: #4fc;
    }
    #nickname-set {
      background: #4fc;
      color: #111;
      border: none;
      padding: 4px 10px;
      font-family: monospace;
      font-size: 13px;
      font-weight: bold;
      border-radius: 4px;
      cursor: pointer;
    }
    #nickname-set:hover {
      background: #3eb;
    }
  </style>
</head>
<body>
  <div id="hud">
    <div class="status" id="status-text">Connecting...</div>
    <div class="info" id="info-text"></div>
  </div>
  <div id="nickname-container">
    <input type="text" id="nickname-input" maxlength="16" placeholder="Enter nickname...">
    <button id="nickname-set">Set</button>
  </div>
  <canvas id="game"></canvas>
  <div id="hp-text">HP</div>
  <div id="hp-bar-container">
    <div id="hp-bar"></div>
  </div>
  <div id="controls-overlay">
    <div id="controls-dialog">
      <h2>Controls</h2>
      <table>
        <tr><td>W A S D</td><td>Move</td></tr>
        <tr><td>Mouse</td><td>Aim</td></tr>
        <tr><td>Left Click</td><td>Shoot</td></tr>
      </table>
      <button id="controls-dismiss">Got it</button>
    </div>
  </div>
  <div id="controls-hint">Press H for controls</div>
  <script src="client.js"></script>
</body>
</html>
