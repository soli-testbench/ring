<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ring - Battle Royale</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #111;
      color: #eee;
      font-family: monospace;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      overflow: hidden;
    }
    canvas {
      border: 1px solid #333;
      cursor: crosshair;
    }
    #hud {
      position: absolute;
      top: 10px;
      left: 50%;
      transform: translateX(-50%);
      text-align: center;
      font-size: 16px;
      pointer-events: none;
      z-index: 10;
    }
    #hud .status {
      font-size: 24px;
      font-weight: bold;
      margin-bottom: 4px;
    }
    #hud .info {
      font-size: 14px;
      color: #aaa;
    }
    #hp-bar-container {
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      width: 200px;
      height: 20px;
      background: #333;
      border: 1px solid #555;
      z-index: 10;
      pointer-events: none;
    }
    #hp-bar {
      height: 100%;
      background: #4f4;
      transition: width 0.1s;
    }
    #hp-text {
      position: absolute;
      bottom: 22px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 12px;
      color: #aaa;
      z-index: 10;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div id="hud">
    <div class="status" id="status-text">Connecting...</div>
    <div class="info" id="info-text"></div>
  </div>
  <canvas id="game"></canvas>
  <div id="hp-text">HP</div>
  <div id="hp-bar-container">
    <div id="hp-bar"></div>
  </div>
  <script src="client.js"></script>
</body>
</html>
